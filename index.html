<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repositorio de profesionales de la salud</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f7f8fa;
      color: #222;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 6px;
    }

    .desc {
      margin-top: 0;
      margin-bottom: 20px;
      color: #555;
    }

    .panel {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      margin-bottom: 18px;
    }

    #filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    select, input, button {
      padding: 10px;
      border: 1px solid #cfd6df;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      background: #215a9c;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .result-info {
      margin: 14px 0;
      font-weight: 700;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }

    .name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .profession {
      font-weight: 700;
      color: #215a9c;
      margin-bottom: 10px;
    }

    .field {
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .field strong {
      display: inline-block;
      min-width: 125px;
    }

    .empty {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Repositorio de profesionales de la salud</h1>
    <p class="desc">Buscá profesionales según distintos criterios.</p>

    <div class="panel">
      <div id="filters"></div>
      <div class="actions">
        <input type="text" id="freeText" placeholder="Buscar texto libre..." />
        <button id="clearFilters">Limpiar filtros</button>
      </div>
    </div>

    <div id="resultsInfo" class="result-info"></div>
    <div id="results"></div>
  </div>

  <script>
    const DATA_URL = "./repositorio_salud_filtros.json";

    let originalData = [];
    let headers = [];
    let filtersState = {};
    let freeText = "";

    async function init() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error("No se pudo cargar el JSON");

        originalData = await response.json();

        if (!originalData.length) {
          document.getElementById("results").innerHTML =
            '<div class="empty">No hay datos disponibles.</div>';
          return;
        }

        headers = Object.keys(originalData[0]);

        headers.forEach((header) => {
          filtersState[header] = "";
        });

        renderFilters();
        bindEvents();
        applyFilters();
      } catch (error) {
        console.error(error);
        document.getElementById("results").innerHTML =
          '<div class="empty">Error al cargar los datos. Verificá que el archivo JSON esté en la misma carpeta que este HTML.</div>';
      }
    }

    function renderFilters() {
      const filtersContainer = document.getElementById("filters");
      filtersContainer.innerHTML = "";

      headers.forEach((header) => {
        const values = [...new Set(
          originalData
            .map((item) => normalize(item[header]))
            .filter((value) => value !== "")
        )].sort((a, b) => a.localeCompare(b, "es"));

        const group = document.createElement("div");
        group.className = "filter-group";

        const label = document.createElement("label");
        label.textContent = header;

        const select = document.createElement("select");
        select.dataset.header = header;

        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "Todos";
        select.appendChild(defaultOption);

        values.forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        });

        select.addEventListener("change", handleFilterChange);

        group.appendChild(label);
        group.appendChild(select);
        filtersContainer.appendChild(group);
      });
    }

    function bindEvents() {
      document.getElementById("clearFilters").addEventListener("click", () => {
        headers.forEach((header) => {
          filtersState[header] = "";
        });

        document.querySelectorAll("#filters select").forEach((select) => {
          select.value = "";
        });

        const freeTextInput = document.getElementById("freeText");
        freeTextInput.value = "";
        freeText = "";

        applyFilters();
      });

      document.getElementById("freeText").addEventListener("input", (event) => {
        freeText = normalize(event.target.value).toLowerCase();
        applyFilters();
      });
    }

    function handleFilterChange(event) {
      const header = event.target.dataset.header;
      filtersState[header] = event.target.value;
      applyFilters();
    }

    function applyFilters() {
      const filteredData = originalData.filter((item) => {
        const passSelects = headers.every((header) => {
          const selectedValue = filtersState[header];
          if (!selectedValue) return true;
          return normalize(item[header]) === selectedValue;
        });

        if (!passSelects) return false;

        if (!freeText) return true;

        return headers.some((header) =>
          normalize(item[header]).toLowerCase().includes(freeText)
        );
      });

      renderResults(filteredData);
    }

    function renderResults(data) {
      const info = document.getElementById("resultsInfo");
      const results = document.getElementById("results");

      info.textContent = `Resultados encontrados: ${data.length}`;

      if (!data.length) {
        results.innerHTML =
          '<div class="empty">No se encontraron resultados para esa combinación.</div>';
        return;
      }

      const cards = document.createElement("div");
      cards.className = "cards";

      data.forEach((item) => {
        const card = document.createElement("div");
        card.className = "card";

        const fullName = `${normalize(item["Nombre"])} ${normalize(item["Apellido"])}`.trim();
        const profession = normalize(item["Profesión"]);

        card.innerHTML = `
          <div class="name">${escapeHtml(fullName || "Sin nombre")}</div>
          <div class="profession">${escapeHtml(profession || "Profesión no informada")}</div>
          ${field("Mail", item["Mail"])}
          ${field("Teléfono", item["Teléfono (fijo o celular)"])}
          ${field("Servicios", item["Servicios q brinda"])}
          ${field("Población", item["Población q atiende"])}
          ${field("Obra social", item["Atiende por obra social"])}
          ${field("Cuál obra social", item['Si su respuesta fue "Sí", ¿con qué obra social trabaja?'])}
          ${field("CUD", item["Atiende pacientes con Certificado discapacidad"])}
          ${field("Zona", item["Zona donde atiende"])}
        `;

        cards.appendChild(card);
      });

      results.innerHTML = "";
      results.appendChild(cards);
    }

    function field(label, value) {
      const clean = normalize(value);
      if (!clean) return "";
      return `<div class="field"><strong>${escapeHtml(label)}:</strong> ${escapeHtml(clean)}</div>`;
    }

    function normalize(value) {
      return value == null ? "" : String(value).trim();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    init();
  </script>
</body>
</html>
